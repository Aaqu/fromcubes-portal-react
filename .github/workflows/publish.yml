name: Publish NPM package

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags: release notes are built from the commit
          # range between the previous package tag and HEAD.
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm
        run: npm install -g npm@latest

      - name: Check the version
        id: check
        run: |
          CURRENT_VERSION=$(jq -r .version package.json)
          echo "Current version: $CURRENT_VERSION"
          PKG_NAME=$(jq -r .name package.json)
          LATEST_TAG=$(git tag --list "${PKG_NAME}@*" --sort=-v:refname | head -n1 || echo "")
          echo "Latest tag: $LATEST_TAG"

          LATEST_VERSION=${LATEST_TAG##*@}
          LATEST_VERSION=${LATEST_VERSION:-0.0.0}
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ];
          then
            echo "Version changed"
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "new_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "prev_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          else
            echo "Version not changed"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Collect commits since last release
        if: steps.check.outputs.version_changed == 'true'
        id: notes
        run: |
          PREV="${{ steps.check.outputs.prev_tag }}"
          if [ -n "$PREV" ] && git rev-parse -q --verify "refs/tags/$PREV" >/dev/null; then
            RANGE="$PREV..HEAD"
          else
            # First release — list everything.
            RANGE="HEAD"
          fi
          {
            echo 'body<<NOTES_EOF'
            echo '## Changes'
            git log "$RANGE" --no-merges --pretty='- %s (%h)'
            echo 'NOTES_EOF'
          } >> $GITHUB_OUTPUT

      - name: Publish
        if: steps.check.outputs.version_changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION=$(jq -r .version package.json)
          if [[ "$VERSION" == *-alpha* ]]; then
            # Alpha releases are published straight to `latest` ON PURPOSE:
            # the registry copies README into the packument only on a publish
            # that sets the latest tag — `npm dist-tag add … latest` after the
            # fact does NOT refresh it, which left the flows.nodered.org page
            # (rendered from packument readme) empty. There is deliberately
            # NO `alpha` dist-tag: `npm dist-tag add` is a 2FA-gated write
            # that fails with EOTP in CI (publish itself passes via OIDC
            # provenance), and `latest` already points at the newest alpha.
            npm publish --tag latest --provenance
          elif [[ "$VERSION" == *-beta* ]]; then
            npm publish --tag beta --provenance
          elif [[ "$VERSION" == *-rc* ]]; then
            npm publish --tag rc --provenance
          else
            npm publish --provenance
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.version_changed == 'true'
        uses: actions/github-script@v9
        env:
          # Passed via env, not template-interpolated into the script —
          # commit subjects may contain backticks/quotes that would break
          # (or inject into) the JS source.
          RELEASE_BODY: ${{ steps.notes.outputs.body }}
        with:
          script: |
            try {
              const version = "${{ steps.check.outputs.new_version }}";
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: `fromcubes-portal-react@${version}`,
                name: `fromcubes-portal-react@${version}`,
                body: process.env.RELEASE_BODY || `Package v${version}`,
              });
            } catch (e) {
              core.setFailed(e.message);
            }
